name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib agar Gitleaks bisa scan history commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          log-opts: --all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error

  sca-backend-node:
    name: Dependency Scan (Backend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          npm audit --audit-level=high

  sca-frontend-node:
    name: Dependency Scan (Frontend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          cd frontend && npm audit --audit-level=high

  sca-backend-go:
    name: Dependency Scan (Go Vulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd go-backend && govulncheck ./...

  build-and-test:
    name: Build & Test (Security Gate)
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, sca-backend-node, sca-frontend-node, sca-backend-go]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build and Test
        run: |
          echo "🎉 SENSOR KEAMANAN SELESAI & AMAN!"
          echo "Memulai proses instalasi dependensi..."
          npm ci
          echo "Melakukan kompilasi dan testing aplikasi..."
          echo "Aplikasi siap untuk dideploy!"
