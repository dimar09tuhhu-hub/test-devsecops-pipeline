name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib agar Gitleaks bisa scan history commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan app.js go-backend/ --config=auto --error --sarif --output=semgrep.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca-backend-node:
    name: Dependency Scan (Backend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          npm audit --audit-level=high

  sca-frontend-node:
    name: Dependency Scan (Frontend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          cd frontend && npm audit --audit-level=high

  sca-backend-go:
    name: Dependency Scan (Go Vulncheck)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd go-backend && govulncheck -format sarif ./... > ../govulncheck.sarif

      - name: Upload Govulncheck SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: govulncheck.sarif

  build-and-test:
    name: Build & Test (Security Gate)
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, sca-backend-node, sca-frontend-node, sca-backend-go]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build and Test
        run: |
          echo "🎉 SENSOR KEAMANAN SELESAI & AMAN!"
          echo "Memulai proses instalasi dependensi..."
          npm ci
          echo "Melakukan kompilasi dan testing aplikasi..."
          echo "Aplikasi siap untuk dideploy!"
