name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Wajib agar Gitleaks bisa scan history commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose --redact --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan app.js go-backend/ --config=auto --sarif --output=semgrep.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca-backend-node:
    name: Dependency Scan (Backend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          npm audit --audit-level=high

  sca-frontend-node:
    name: Dependency Scan (Frontend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          cd frontend && npm audit --audit-level=high

  sca-backend-go:
    name: Dependency Scan (Go Vulncheck)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd go-backend && govulncheck -format sarif ./... > ../govulncheck.sarif

      - name: Upload Govulncheck SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: govulncheck.sarif

  build-and-test:
    name: Build & Test (Security Gate)
    runs-on: ubuntu-latest
    needs:
      [gitleaks, semgrep, sca-backend-node, sca-frontend-node, sca-backend-go]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build and Test
        run: |
          echo "🎉 SENSOR KEAMANAN SELESAI & AMAN!"
          echo "Memulai proses instalasi dependensi..."
          npm ci
          echo "Melakukan kompilasi dan testing aplikasi..."
          echo "Aplikasi siap untuk dideploy!"

  container-scan:
    name: Container Scan (Grype)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Generate SBOM using Syft
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: spdx-json
          output-file: my-app-sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: my-app-sbom.spdx.json

      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          sbom: "my-app-sbom.spdx.json"
          fail-build: true
          severity-cutoff: high

      - name: Upload Grype SARIF Report to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}

      - name: Generate Grype & SBOM Markdown Summary
        if: always()
        run: |
          SARIF_FILE="${{ steps.grype-scan.outputs.sarif }}"
          SBOM_FILE="my-app-sbom.spdx.json"

          echo "### 🔎 Grype Vulnerability Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$SARIF_FILE" ]; then
            CRITICAL=$(jq '[.runs[0].results[] | select(.properties.severity == "Critical")] | length' "$SARIF_FILE")
            HIGH=$(jq '[.runs[0].results[] | select(.properties.severity == "High")] | length' "$SARIF_FILE")
            MEDIUM=$(jq '[.runs[0].results[] | select(.properties.severity == "Medium")] | length' "$SARIF_FILE")
            LOW=$(jq '[.runs[0].results[] | select(.properties.severity == "Low")] | length' "$SARIF_FILE")
            NEGLIGIBLE=$(jq '[.runs[0].results[] | select(.properties.severity == "Negligible")] | length' "$SARIF_FILE")
            UNKNOWN=$(jq '[.runs[0].results[] | select(.properties.severity == "Unknown")] | length' "$SARIF_FILE")
            
            TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW + NEGLIGIBLE + UNKNOWN))

            echo "#### 🖼️ Container Image Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| **🔴 CRITICAL** | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **🟠 HIGH** | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| **🟡 MEDIUM** | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| **🔵 LOW** | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| **⚪ NEGLIGIBLE** | $NEGLIGIBLE |" >> $GITHUB_STEP_SUMMARY
            echo "| **❓ UNKNOWN** | $UNKNOWN |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total: $TOTAL vulnerabilities**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL" -gt 0 ]; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Lihat detail CVE (maks 50 baris pertama)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| No | Severity | Package / Path | Vulnerability | Description |" >> $GITHUB_STEP_SUMMARY
              echo "| --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

              # Map rules to helpUri for external links
              jq -r '
                .runs[0] as $run
                | ($run.tool.driver.rules // [] | map({key: .id, value: .helpUri}) | from_entries) as $rule_uris
                | $run.results
                | sort_by(
                    if .properties.severity == "Critical" then 0
                    elif .properties.severity == "High" then 1
                    elif .properties.severity == "Medium" then 2
                    elif .properties.severity == "Low" then 3
                    elif .properties.severity == "Negligible" then 4
                    else 5 end
                  )
                | limit(50; .[])
                | [
                    .properties.severity,
                    (.locations[0].physicalLocation.artifactLocation.uri // "-"),
                    .ruleId,
                    ($rule_uris[.ruleId] // "https://nvd.nist.gov/vuln/detail/" + .ruleId),
                    (.message.text // "" | gsub("\n"; " ") | gsub("\t"; " ") | gsub("\\|"; "\\|"))
                  ]
                | @tsv
              ' "$SARIF_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | [" $3 "](" $4 ") | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "No vulnerabilities found ✅" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Gagal memuat laporan Grype (file SARIF tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$SBOM_FILE" ]; then
            TOTAL_COMPONENTS=$(jq '.packages | length' "$SBOM_FILE")
            echo "**Total components: $TOTAL_COMPONENTS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Ecosystem | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              [
                .packages[] | 
                ((.externalRefs[]? | select(.referenceCategory == "PACKAGE-MANAGER") | .referenceLocator | split("/")[0] | split(":")[1]) // "unknown")
              ]
              | group_by(.)
              | map({ecosystem: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| " + .ecosystem + " | " + (.count | tostring) + " |"
            ' "$SBOM_FILE" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Lihat semua komponen (maks 200 baris)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| No | Package Name | Version | Ecosystem |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              .packages
              | sort_by(.name)
              | limit(200; .[])
              | [
                  .name,
                  .versionInfo,
                  ((.externalRefs[]? | select(.referenceCategory == "PACKAGE-MANAGER") | .referenceLocator | split("/")[0] | split(":")[1]) // "unknown")
                ]
              | @tsv
            ' "$SBOM_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gagal memuat SBOM (file SPDX JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi



