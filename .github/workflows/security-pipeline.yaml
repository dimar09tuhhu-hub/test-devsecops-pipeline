name: DevSecOps Security Pipeline (Syft & Grype Scan)

on:
  push:
    branches: [main, experiment/grype-syft]
  pull_request:
    branches: [main, experiment/grype-syft]
  workflow_dispatch:

jobs:
  container-scan:
    name: Container Scan & SBOM Generation (Syft + Grype)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Generate SBOM using Syft (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: cyclonedx-json
          output-file: my-app-sbom.cdx.json

      - name: Generate SBOM using Syft (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: spdx-json
          output-file: my-app-sbom.spdx.json

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            my-app-sbom.cdx.json
            my-app-sbom.spdx.json

      - name: Upload CycloneDX SBOM to OWASP Dependency-Track
        if: always()
        env:
          DTRACK_URL: ${{ secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          PROJECT_UUID: ${{ secrets.DTRACK_PROJECT_UUID }}
        run: |
          if [ -z "$DTRACK_URL" ] || [ -z "$DTRACK_API_KEY" ]; then
            echo "⚠️ DTRACK_URL atau DTRACK_API_KEY belum di-set di Secrets. Step upload Dependency-Track dilewati."
            exit 0
          fi

          echo "🚀 Mengunggah CycloneDX SBOM ke Dependency-Track (${DTRACK_URL})..."
          if [ -n "$PROJECT_UUID" ]; then
            curl -s -X POST "${DTRACK_URL}/api/v1/bom" \
              -H "X-API-Key: ${DTRACK_API_KEY}" \
              -H "Content-Type: multipart/form-data" \
              -F "project=${PROJECT_UUID}" \
              -F "bom=@my-app-sbom.cdx.json"
          else
            curl -s -X POST "${DTRACK_URL}/api/v1/bom" \
              -H "X-API-Key: ${DTRACK_API_KEY}" \
              -H "Content-Type: multipart/form-data" \
              -F "autoCreate=true" \
              -F "projectName=${{ github.event.repository.name }}" \
              -F "projectVersion=main" \
              -F "bom=@my-app-sbom.cdx.json"
          fi
          echo ""
          echo "✅ Upload CycloneDX SBOM ke Dependency-Track selesai!"


      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          sbom: "my-app-sbom.cdx.json"
          fail-build: true
          severity-cutoff: high

      - name: Upload Grype SARIF Report to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}

      - name: Generate Grype & SBOM Markdown Summary
        if: always()
        run: |
          SBOM_FILE="my-app-sbom.cdx.json"
          JSON_FILE="grype-results.json"

          # Install grype binary locally to avoid command not found errors
          mkdir -p ./bin-tools
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b ./bin-tools

          # Run Grype locally on the SBOM to produce a simple, clean JSON report
          ./bin-tools/grype sbom:"$SBOM_FILE" -o json > "$JSON_FILE"

          echo "### 🔎 Grype Vulnerability Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s "$JSON_FILE" ]; then
            TOTAL=$(jq '[.matches[]?] | length' "$JSON_FILE")
            echo "#### 🖼️ Container Image Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            for sev in CRITICAL HIGH MEDIUM LOW UNKNOWN; do
              count=$(jq --arg sev "$sev" '[.matches[]? | select(.vulnerability.severity | ascii_upcase == $sev)] | length' "$JSON_FILE")
              if [ "$count" -gt 0 ]; then
                echo "| $sev | $count |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total: $TOTAL vulnerabilities**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL" -gt 0 ]; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Lihat detail CVE (maks 50 baris pertama)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| No | Severity | Package | Version | Vulnerability | Description |" >> $GITHUB_STEP_SUMMARY
              echo "| --- | --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

              # detailed findings
              jq -r '
                [.matches[]?]
                | sort_by(.vulnerability.severity as $s | ({"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"UNKNOWN":4}[$s | ascii_upcase] // 5))
                | limit(50; .[])
                | [
                    (.vulnerability.severity | ascii_upcase),
                    .artifact.name,
                    .artifact.version,
                    .vulnerability.id,
                    (.vulnerability.description // "" | gsub("\n"; " ") | gsub("\t"; " ") | gsub("\\|"; "\\|"))
                  ]
                | @tsv
              ' "$JSON_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " | [" $4 "](https://nvd.nist.gov/vuln/detail/" $4 ") | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "No vulnerabilities found ✅" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Gagal memuat laporan Grype (file JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SPDX_FILE="my-app-sbom.spdx.json"
          if [ -s "$SPDX_FILE" ] && [ -s "$SBOM_FILE" ]; then
            TOTAL_CDX=$(jq '.components | length' "$SBOM_FILE")
            TOTAL_SPDX=$(jq '.packages | length' "$SPDX_FILE")
            echo "- **Total components (CycloneDX):** $TOTAL_CDX" >> $GITHUB_STEP_SUMMARY
            echo "- **Total components (SPDX):** $TOTAL_SPDX" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -s "$SBOM_FILE" ]; then
            echo "#### 📋 CycloneDX Components Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Type | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              [
                .components[] | .type
              ]
              | group_by(.)
              | map({type: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| " + .type + " | " + (.count | tostring) + " |"
            ' "$SBOM_FILE" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Lihat semua komponen (maks 200 baris)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| No | Package Name | Version | Type |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              .components
              | sort_by(.name)
              | limit(200; .[])
              | [
                  .name,
                  .version,
                  .type
                ]
              | @tsv
            ' "$SBOM_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gagal memuat SBOM (file JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi
