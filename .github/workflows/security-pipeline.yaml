name: DevSecOps Security Pipeline (Syft & Grype Scan)

on:
  push:
    branches: [main, experiment/grype-syft]
  pull_request:
    branches: [main, experiment/grype-syft]
  workflow_dispatch:

jobs:
  container-scan:
    name: Container Scan & SBOM Generation (Syft + Grype)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Generate SBOM using Syft (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: cyclonedx-json
          output-file: my-app-sbom.cdx.json

      - name: Generate SBOM using Syft (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: spdx-json
          output-file: my-app-sbom.spdx.json

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            my-app-sbom.cdx.json
            my-app-sbom.spdx.json

      - name: Verify & Inspect SBOM File
        if: always()
        run: |
          echo "🔍 === Step Verifikasi File SBOM ==="
          if [ -f "my-app-sbom.cdx.json" ]; then
            echo "✅ File 'my-app-sbom.cdx.json' ditemukan."
            echo "📊 Ukuran file:"
            ls -lh my-app-sbom.cdx.json
            echo "📏 Jumlah baris:"
            wc -l my-app-sbom.cdx.json
            echo ""
            echo "📋 15 Baris Pertama File SBOM:"
            head -n 15 my-app-sbom.cdx.json
            echo ""
            if jq . my-app-sbom.cdx.json >/dev/null 2>&1; then
              echo "✅ Format JSON Valid!"
            else
              echo "❌ ERROR: Format JSON tidak valid!"
            fi
          else
            echo "❌ ERROR: File 'my-app-sbom.cdx.json' tidak ditemukan!"
          fi
          echo "===================================="

      - name: Upload CycloneDX SBOM to OWASP Dependency-Track
        if: always()
        env:
          DTRACK_URL: ${{ secrets.DEPENDENCY_TRACK_URL || secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY || secrets.DTRACK_API_KEY }}
          PROJECT_UUID: ${{ secrets.DEPENDENCY_TRACK_PROJECT_ID || secrets.DTRACK_PROJECT_UUID }}
        run: |
          if [ ! -f "my-app-sbom.cdx.json" ]; then
            echo "⚠️ File SBOM 'my-app-sbom.cdx.json' tidak ditemukan. Step upload Dependency-Track dilewati."
            exit 0
          fi

          if [ -z "$DTRACK_URL" ] || [ -z "$DTRACK_API_KEY" ]; then
            echo "⚠️ DEPENDENCY_TRACK_URL atau DEPENDENCY_TRACK_API_KEY belum di-set di GitHub Secrets. Step upload Dependency-Track dilewati."
            exit 0
          fi

          # Clean URL: strip whitespace and trailing slashes
          CLEAN_URL=$(echo "$DTRACK_URL" | xargs | sed 's;/*$;;')

          # Auto-prefix http/https if missing
          if [[ "$CLEAN_URL" != http://* ]] && [[ "$CLEAN_URL" != https://* ]]; then
            CLEAN_URL="https://${CLEAN_URL}"
          fi

          TARGET_ENDPOINT="${CLEAN_URL}/api/v1/bom"
          echo "🚀 Mengunggah CycloneDX SBOM ke: ${TARGET_ENDPOINT}"

          # Sanitize null bytes (0x00 and \u0000) from SBOM to prevent PostgreSQL UTF8 error
          tr -d '\000' < my-app-sbom.cdx.json | sed 's/\\u0000//g' > my-app-sbom.cdx.clean.json
          mv my-app-sbom.cdx.clean.json my-app-sbom.cdx.json

          # Encode SBOM file to Base64 (single line)
          BOM_BASE64=$(base64 -w 0 my-app-sbom.cdx.json | tr -d '\r\n')
          
          # Clean version name (replace slashes with dashes for clean UI routing)
          CLEAN_VERSION=$(echo "${{ github.ref_name }}" | sed 's;/;-;g')

          if [ -n "$PROJECT_UUID" ]; then
            JSON_PAYLOAD=$(jq -n --arg proj "$PROJECT_UUID" --arg bom "$BOM_BASE64" '{project: $proj, bom: $bom}')
          else
            JSON_PAYLOAD=$(jq -n \
              --arg name "${{ github.event.repository.name }}" \
              --arg ver "$CLEAN_VERSION" \
              --arg bom "$BOM_BASE64" \
              '{autoCreate: true, projectName: $name, projectVersion: $ver, bom: $bom}')
          fi

          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PUT "${TARGET_ENDPOINT}" \
            -H "X-API-Key: ${DTRACK_API_KEY}" \
            -H "ngrok-skip-browser-warning: true" \
            -H "User-Agent: curl/7.68.0" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_CODE:" | sed 's/HTTP_CODE://')
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')

          echo "🔍 === Respon API Dependency-Track ==="
          echo "HTTP Status Code: ${HTTP_STATUS}"
          echo "Full Response Body:"
          echo "$BODY"
          echo "======================================"
          echo ""

          TOKEN=$(echo "$BODY" | jq -r '.token // empty' 2>/dev/null)

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Upload SBOM Berhasil! (HTTP ${HTTP_STATUS})"
            if [ -n "$TOKEN" ]; then
              echo "🔑 Processing Token: ${TOKEN}"
              echo "📌 Dependency-Track sedang mengurai SBOM di latar belakang menggunakan Token di atas."
            fi
          else
            echo "⚠️ Upload SBOM ke Dependency-Track Gagal dengan HTTP Status ${HTTP_STATUS}."
            echo "Silakan periksa apakah API Key dan service Dependency-Track (port 8080) di lokal dalam keadaan aktif."
          fi


      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          sbom: "my-app-sbom.cdx.json"
          fail-build: true
          severity-cutoff: high

      - name: Upload Grype SARIF Report to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}

      - name: Generate Grype & SBOM Markdown Summary
        if: always()
        run: |
          SBOM_FILE="my-app-sbom.cdx.json"
          JSON_FILE="grype-results.json"

          # Install grype binary locally to avoid command not found errors
          mkdir -p ./bin-tools
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b ./bin-tools

          # Run Grype locally on the SBOM to produce a simple, clean JSON report
          ./bin-tools/grype sbom:"$SBOM_FILE" -o json > "$JSON_FILE"

          echo "### 🔎 Grype Vulnerability Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s "$JSON_FILE" ]; then
            TOTAL=$(jq '[.matches[]?] | length' "$JSON_FILE")
            echo "#### 🖼️ Container Image Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            for sev in CRITICAL HIGH MEDIUM LOW UNKNOWN; do
              count=$(jq --arg sev "$sev" '[.matches[]? | select(.vulnerability.severity | ascii_upcase == $sev)] | length' "$JSON_FILE")
              if [ "$count" -gt 0 ]; then
                echo "| $sev | $count |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total: $TOTAL vulnerabilities**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL" -gt 0 ]; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Lihat detail CVE (maks 50 baris pertama)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| No | Severity | Package | Version | Vulnerability | Description |" >> $GITHUB_STEP_SUMMARY
              echo "| --- | --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

              # detailed findings
              jq -r '
                [.matches[]?]
                | sort_by(.vulnerability.severity as $s | ({"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"UNKNOWN":4}[$s | ascii_upcase] // 5))
                | limit(50; .[])
                | [
                    (.vulnerability.severity | ascii_upcase),
                    .artifact.name,
                    .artifact.version,
                    .vulnerability.id,
                    (.vulnerability.description // "" | gsub("\n"; " ") | gsub("\t"; " ") | gsub("\\|"; "\\|"))
                  ]
                | @tsv
              ' "$JSON_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " | [" $4 "](https://nvd.nist.gov/vuln/detail/" $4 ") | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "No vulnerabilities found ✅" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Gagal memuat laporan Grype (file JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SPDX_FILE="my-app-sbom.spdx.json"
          if [ -s "$SPDX_FILE" ] && [ -s "$SBOM_FILE" ]; then
            TOTAL_CDX=$(jq '.components | length' "$SBOM_FILE")
            TOTAL_SPDX=$(jq '.packages | length' "$SPDX_FILE")
            echo "- **Total components (CycloneDX):** $TOTAL_CDX" >> $GITHUB_STEP_SUMMARY
            echo "- **Total components (SPDX):** $TOTAL_SPDX" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -s "$SBOM_FILE" ]; then
            echo "#### 📋 CycloneDX Components Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Type | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              [
                .components[] | .type
              ]
              | group_by(.)
              | map({type: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| " + .type + " | " + (.count | tostring) + " |"
            ' "$SBOM_FILE" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Lihat semua komponen (maks 200 baris)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| No | Package Name | Version | Type |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              .components
              | sort_by(.name)
              | limit(200; .[])
              | [
                  .name,
                  .version,
                  .type
                ]
              | @tsv
            ' "$SBOM_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gagal memuat SBOM (file JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi
