name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  trufflehog:
    name: Secrets Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ""

  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan app.js go-backend/ --config=auto --sarif --output=semgrep.sarif --fail-on-severity=ERROR

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca-backend-node:
    name: Dependency Scan (Backend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          npm audit --audit-level=high

  sca-frontend-node:
    name: Dependency Scan (Frontend NPM Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run NPM Audit
        run: |
          cd frontend && npm audit --audit-level=high

  sca-backend-go:
    name: Dependency Scan (Go Vulncheck)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd go-backend && govulncheck -format sarif ./... > ../govulncheck.sarif

      - name: Upload Govulncheck SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: govulncheck.sarif

  build-and-test:
    name: Build & Test (Security Gate)
    runs-on: ubuntu-latest
    needs:
      [trufflehog, semgrep, sca-backend-node, sca-frontend-node, sca-backend-go]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Simulate Build and Test
        run: |
          echo "🎉 SENSOR KEAMANAN SELESAI & AMAN!"
          echo "Memulai proses instalasi dependensi..."
          npm ci
          echo "Melakukan kompilasi dan testing aplikasi..."
          echo "Aplikasi siap untuk dideploy!"

  container-scan:
    name: Container Scan (Grype)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-app:latest .

      - name: Generate SBOM using Syft
        uses: anchore/sbom-action@v0
        with:
          image: "my-app:latest"
          format: spdx-json
          output-file: my-app-sbom.spdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: my-app-sbom.spdx.json

      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          sbom: "my-app-sbom.spdx.json"
          fail-build: true
          severity-cutoff: high

      - name: Upload Grype SARIF Report to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}

      - name: Generate Grype & SBOM Markdown Summary
        if: always()
        run: |
          SBOM_FILE="my-app-sbom.spdx.json"
          JSON_FILE="grype-results.json"

          # Install grype binary locally to avoid command not found errors
          mkdir -p ./bin-tools
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b ./bin-tools

          # Run Grype locally on the SBOM to produce a simple, clean JSON report
          ./bin-tools/grype sbom:"$SBOM_FILE" -o json > "$JSON_FILE"

          echo "### 🔎 Grype Vulnerability Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s "$JSON_FILE" ]; then
            TOTAL=$(jq '[.matches[]?] | length' "$JSON_FILE")
            echo "#### 🖼️ Container Image Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            for sev in CRITICAL HIGH MEDIUM LOW UNKNOWN; do
              count=$(jq --arg sev "$sev" '[.matches[]? | select(.vulnerability.severity | ascii_upcase == $sev)] | length' "$JSON_FILE")
              if [ "$count" -gt 0 ]; then
                echo "| $sev | $count |" >> $GITHUB_STEP_SUMMARY
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total: $TOTAL vulnerabilities**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL" -gt 0 ]; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Lihat detail CVE (maks 50 baris pertama)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| No | Severity | Package | Version | Vulnerability | Description |" >> $GITHUB_STEP_SUMMARY
              echo "| --- | --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

              # detailed findings
              jq -r '
                [.matches[]?]
                | sort_by(.vulnerability.severity as $s | ({"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"UNKNOWN":4}[$s | ascii_upcase] // 5))
                | limit(50; .[])
                | [
                    (.vulnerability.severity | ascii_upcase),
                    .artifact.name,
                    .artifact.version,
                    .vulnerability.id,
                    (.vulnerability.description // "" | gsub("\n"; " ") | gsub("\t"; " ") | gsub("\\|"; "\\|"))
                  ]
                | @tsv
              ' "$JSON_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " | [" $4 "](https://nvd.nist.gov/vuln/detail/" $4 ") | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            else
              echo "No vulnerabilities found ✅" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Gagal memuat laporan Grype (file JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -s "$SBOM_FILE" ]; then
            TOTAL_COMPONENTS=$(jq '.packages | length' "$SBOM_FILE")
            echo "**Total components: $TOTAL_COMPONENTS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Ecosystem | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              [
                .packages[] | 
                ((.externalRefs[]? | select(.referenceCategory == "PACKAGE-MANAGER") | .referenceLocator | split("/")[0] | split(":")[1]) // "unknown")
              ]
              | group_by(.)
              | map({ecosystem: .[0], count: length})
              | sort_by(-.count)
              | .[]
              | "| " + .ecosystem + " | " + (.count | tostring) + " |"
            ' "$SBOM_FILE" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Lihat semua komponen (maks 200 baris)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| No | Package Name | Version | Ecosystem |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

            jq -r '
              .packages
              | sort_by(.name)
              | limit(200; .[])
              | [
                  .name,
                  .versionInfo,
                  ((.externalRefs[]? | select(.referenceCategory == "PACKAGE-MANAGER") | .referenceLocator | split("/")[0] | split(":")[1]) // "unknown")
                ]
              | @tsv
            ' "$SBOM_FILE" | awk -F'\t' '{print "| " NR " | " $1 " | " $2 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Gagal memuat SBOM (file SPDX JSON tidak ditemukan)." >> $GITHUB_STEP_SUMMARY
          fi




